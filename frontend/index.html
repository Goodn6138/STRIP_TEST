<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stripe Test</title>
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    #status { margin-top: 20px; font-size: 18px; font-weight: bold; }
  </style>
</head>
<body>

  <h2>Pay $10</h2>
  <button id="checkout-button">Pay</button>
  <p id="status"></p>

  <script>
    // ✅ Your frontend URL (where this HTML is hosted)
    const FRONTEND_URL = "https://strip-test.onrender.com";

    // ✅ Your backend URL (Flask app URL)
    const BACKEND_URL = "https://goober-ko72.onrender.com";

    async function initStripe() {
      try {
        // Fetch Stripe public key from backend
        const response = await fetch(`${BACKEND_URL}/config`);
        const data = await response.json();
        const stripe = Stripe(data.publicKey);

        // Listen for button click
        document.getElementById("checkout-button").addEventListener("click", async () => {
          const sessionResponse = await fetch(`${BACKEND_URL}/create-checkout-session`, {
            method: "POST",
            headers: { "Content-Type": "application/json" }
          });

          const session = await sessionResponse.json();

          if (!session.id) {
            alert("Error creating Stripe session");
            return;
          }

          const result = await stripe.redirectToCheckout({
            sessionId: session.id
          });

          if (result.error) {
            alert(result.error.message);
          }
        });

      } catch (err) {
        console.error(err);
        document.getElementById("status").innerText = "⚠️ Failed to initialize Stripe";
      }
    }

    initStripe();

    // ✅ Handle success/cancel messages from query params
    const params = new URLSearchParams(window.location.search);
    if (params.get("success")) {
      document.getElementById("status").innerText = "✅ Payment successful!";
    }
    if (params.get("canceled")) {
      document.getElementById("status").innerText = "❌ Payment canceled.";
    }

  </script>

</body>
</html>
