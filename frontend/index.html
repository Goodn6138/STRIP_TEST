<!DOCTYPE html>
<html>
<head>
  <title>Stripe Test</title>
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body>

  <h2>Pay $10</h2>
  <button id="checkout-button">Pay</button>

  <script>
    // ✅ Replace with your frontend's backend URL
    const BACKEND_URL = "https://goober-ko72.onrender.com";

    let stripe;

    // 🔹 Fetch the public key from backend
    async function initStripe() {
      try {
        const res = await fetch(`${BACKEND_URL}/config`);
        const data = await res.json();

        if (!data.publicKey) {
          throw new Error("No public key returned");
        }

        stripe = Stripe(data.publicKey);
      } catch (err) {
        console.error("Failed to initialize Stripe:", err);
        alert("Stripe failed to initialize. Check console.");
      }
    }

    initStripe();

    // 🔹 Handle button click
    document.getElementById("checkout-button").addEventListener("click", async () => {
      if (!stripe) return alert("Stripe not initialized");

      try {
        const res = await fetch(`${BACKEND_URL}/create-checkout-session`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          }
        });

        const session = await res.json();

        if (!session.id) {
          throw new Error("No session ID returned");
        }

        // Redirect to Stripe Checkout
        const result = await stripe.redirectToCheckout({ sessionId: session.id });

        if (result.error) {
          alert(result.error.message);
        }

      } catch (err) {
        console.error("Checkout failed:", err);
        alert("Payment failed. Check console.");
      }
    });
  </script>

</body>
</html>
