<!DOCTYPE html>
<html>
<head>
  <title>Stripe Test</title>
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body>

  <h2>Pay $10</h2>
  <button id="checkout-button">Pay</button>

  <script>
    const BACKEND_URL = "https://goober-ko72.onrender.com"; // backend URL

    let stripe;

    async function initStripe() {
      try {
        const res = await fetch(`${BACKEND_URL}/config`);
        const data = await res.json();
        if (!data.publicKey) throw new Error("No public key returned");

        stripe = Stripe(data.publicKey);
      } catch (err) {
        console.error("Stripe initialization failed:", err);
        alert("Stripe failed to initialize. Check console.");
      }
    }

    initStripe();

    document.getElementById("checkout-button").addEventListener("click", async () => {
      if (!stripe) return alert("Stripe not initialized");

      try {
        const res = await fetch(`${BACKEND_URL}/create-checkout-session`, {
          method: "POST",
          headers: { "Content-Type": "application/json" }
        });
        const session = await res.json();
        if (!session.id) throw new Error("No session ID returned");

        await stripe.redirectToCheckout({ sessionId: session.id });
      } catch (err) {
        console.error("Checkout failed:", err);
        alert("Payment failed. Check console.");
      }
    });
  </script>

</body>
</html>
